# Chrome flags — /usr/bin/google-chrome-stable wrapper'ı tarafından okunur.
# Bir flag bir satırda. `#` ile başlayan satırlar yorum.
#
# Hedef: Hyprland blur'unun video üzerine uygulanmaması.
# Mekanizma: Wayland + GPU compositing + donanım video decode → Chrome
# video karesini opaque subsurface olarak sunar, Hyprland o bölgeyi blur dışı bırakır.
#
# NVIDIA ortam değişkenleri (LIBVA_DRIVER_NAME, NVD_BACKEND, vs.) Hyprland
# tarafında ~/.config/hypr/gpu-env.conf üzerinden zaten set ediliyor.

# Wayland native çalıştır (XWayland değil)
--ozone-platform-hint=auto

# Donanım video decode (VA-API → libva-nvidia-driver → NVDEC)
--enable-features=VaapiVideoDecoder,VaapiVideoDecodeLinuxGL
--disable-features=UseChromeOSDirectVideoDecoder

# GPU acceleration
--ignore-gpu-blocklist
--enable-gpu-rasterization
--enable-zero-copy
