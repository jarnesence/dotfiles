<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!--
  Font rendering — ASUS XG27AQDMG (27" / 2560×1440 / ~109 PPI / LG WOLED WRGB)

  Son karar: Cascadia Code NF (Microsoft, Nerd Font patched) — TÜM SİSTEMDE.
  sans/serif/monospace üçünde de aynı family default. Nerd glyph'leri + ligature
  aynı fontta, fallback zinciri minimum.

  OLED WRGB subpixel LCD-RGB rendering'le uyumlu değildir (W altpiksel
  color fringing yaratır). Grayscale AA: rgba=none + lcdfilter=lcdnone.
-->
<fontconfig>

  <!-- Render ayarları -->
  <match target="font">
    <edit name="antialias"      mode="assign"><bool>true</bool></edit>
    <edit name="hinting"        mode="assign"><bool>true</bool></edit>
    <edit name="hintstyle"      mode="assign"><const>hintslight</const></edit>
    <edit name="rgba"           mode="assign"><const>none</const></edit>
    <edit name="lcdfilter"      mode="assign"><const>lcdnone</const></edit>
    <edit name="embeddedbitmap" mode="assign"><bool>false</bool></edit>
    <edit name="autohint"       mode="assign"><bool>false</bool></edit>
  </match>

  <!-- sans-serif → Cascadia Code NF -->
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>Cascadia Code NF</family>
      <family>Cascadia Code</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

  <!-- serif → Cascadia Code NF (unifikasyon) -->
  <alias>
    <family>serif</family>
    <prefer>
      <family>Cascadia Code NF</family>
      <family>Cascadia Code</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

  <!-- monospace → Cascadia Code NF (ligature + nerd glyph + programming) -->
  <alias>
    <family>monospace</family>
    <prefer>
      <family>Cascadia Code NF</family>
      <family>Cascadia Code</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

  <!-- Emoji -->
  <alias>
    <family>emoji</family>
    <prefer>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

</fontconfig>
