# Hyprland — bootstrap config
# Canlı konum: ~/.config/hypr/hyprland.conf (bu dosyaya symlink)
# Kaynak:     ~/Claude/dotfiles/hypr/hyprland.conf (düzenlenecek yer)
#
# Bu config KASITLI minimal: yalnızca çalışır bir oturum + Super+T ile terminal.
# Görsel katman (animasyon, blur, bar, launcher, tema) Hyprland içinde,
# "göre göre" aşamasında eklenecek.

# ─── Monitors ─────────────────────────────────────────────
# DP-1: ASUS XG27AQDMG (27" OLED, 2560x1440 native, 240Hz max, VRR var).
# Format: monitor = NAME, RESxHZ, POS, SCALE
monitor = DP-1, 2560x1440@239.97, 0x0, 1

# Başka monitör takılırsa native@preferred alır:
monitor = , preferred, auto, 1

# ─── Theme colors (matugen, wallpaper'dan üretilir) ────────
source = ~/.config/hypr/colors.conf

# ─── Autostart ────────────────────────────────────────────
exec-once = ~/.config/hypr/scripts/live-wallpaper.sh
# waybar config host'a göre render (desktop vs laptop)
exec-once = ~/.config/hypr/scripts/waybar-host-setup.sh
exec-once = waybar
# mako: terminal-aesthetic notification daemon
exec-once = mako
exec-once = systemctl --user start hyprpolkitagent   # GUI şifre prompt'u
exec-once = swayosd-server                           # volume/mute OSD popup'ları
# clipboard history — wl-paste watcher'lar (text + resim)
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# ─── Environment ──────────────────────────────────────────
# GPU-spesifik env (nvidia/amd/intel) → ~/Claude/dotfiles/install/gpu-detect.sh üretir
source = ~/.config/hypr/gpu-env.conf

# Wayland genel
env = XDG_SESSION_TYPE,wayland
env = QT_QPA_PLATFORM,wayland;xcb
env = MOZ_ENABLE_WAYLAND,1

# SDDM autologin Hyprland'a XDG_DATA_DIRS geçirmiyor (login shell kaçılıyor).
# rofi/xdg-open vs. .desktop bulamıyor — manuel set ediyoruz.
env = XDG_DATA_DIRS,/usr/local/share:/usr/share

# ─── Cursor ───────────────────────────────────────────────
env = XCURSOR_THEME,Future-dark-cursors
env = XCURSOR_SIZE,29
env = HYPRCURSOR_THEME,Future-dark-cursors
env = HYPRCURSOR_SIZE,29
# Modern Nvidia driver'da hw cursor stabil, zorlamaya gerek yok.
# Cursor glitch görürsen: env = WLR_NO_HARDWARE_CURSORS,1

# ─── Input ────────────────────────────────────────────────
input {
    kb_layout  = tr
    kb_model   = pc105
    kb_options = terminate:ctrl_alt_bksp
    follow_mouse = 1
    sensitivity = 0
}

# ─── Keybinds ─────────────────────────────────────────────
$mod = SUPER

# Uygulamalar
bind = $mod, T, exec, kitty
bind = $mod, A, exec, google-chrome-stable

# App launcher (TUI, kitty içinde fzf)
bind = $mod, SPACE, exec, kitty --class=tui-launcher -e ~/.config/hypr/scripts/tui-launcher.sh

# Clipboard history — TUI
bind = $mod, V, exec, kitty --class=tui-clipboard -e ~/.config/hypr/scripts/tui-clipboard.sh

# Settings paneli — TUI (network, bluetooth, ses, sistem, çıkış)
bind = $mod, I, exec, kitty --class=tui-settings -e ~/.config/hypr/scripts/tui-settings.sh

# Waybar toggle — Super+B bar'ı gizle/göster (SIGUSR1)
bind = $mod, B, exec, pkill -SIGUSR1 waybar

# Screenshot: Super+S tam ekran, Super+Shift+S alan seç. İkisi de panoya kopyalar + kaydeder.
bind = $mod,       S, exec, ~/.config/hypr/scripts/screenshot.sh full
bind = $mod SHIFT, S, exec, ~/.config/hypr/scripts/screenshot.sh area

# Medya tuşları — swayosd OSD'siyle volume/mute, playerctl ile play/pause/next/prev.
# `bindel` = locked + repeatable → ekran kilitliyken ve basılı tutmada çalışır.
bindel = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
bindel = , XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
bindl  = , XF86AudioMute,        exec, swayosd-client --output-volume mute-toggle
bindl  = , XF86AudioMicMute,     exec, swayosd-client --input-volume mute-toggle
bindl  = , XF86AudioPlay,        exec, playerctl play-pause
bindl  = , XF86AudioNext,        exec, playerctl next
bindl  = , XF86AudioPrev,        exec, playerctl previous

# Pencere yönetimi
bind = $mod, Q, killactive,
bind = $mod, W, togglefloating,
bind = $mod, F, fullscreen,
bind = $mod SHIFT, M, exit,

# Wallpaper cycle (yeni renk paleti otomatik üretilir)
bind = $mod ALT, B, exec, ~/.config/hypr/scripts/live-wallpaper-next.sh

# Renk paleti şemasını döndür (pastel / sadık / ekspresif / dengeli / canlı / tek-ton)
bind = $mod, M, exec, ~/.config/hypr/scripts/palette-scheme-next.sh

# Pencere odağı (ok tuşları)
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d

# Workspace (1-9)
bind = $mod,       1, workspace, 1
bind = $mod,       2, workspace, 2
bind = $mod,       3, workspace, 3
bind = $mod,       4, workspace, 4
bind = $mod,       5, workspace, 5
bind = $mod,       6, workspace, 6
bind = $mod,       7, workspace, 7
bind = $mod,       8, workspace, 8
bind = $mod,       9, workspace, 9
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9

# Mouse ile taşı/resize (Super basılıyken)
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# ─── Misc ─────────────────────────────────────────────────
misc {
    # VRR (Adaptive Sync / G-Sync / FreeSync)
    #   0 = kapalı
    #   1 = sadece fullscreen uygulamalarda (OLED + gaming için en güvenli)
    #   2 = her zaman (düşük FPS'te OLED brightness flicker'a yol açabilir)
    vrr = 1

    # Varsayılan compositor arka plan rengi — wallpaper yüklenmeden önce /
    # wallpaper değişim gap'inde görünür. Siyah = temiz, keskin geçişler.
    background_color = rgb(000000)

    # Hyprland boş-workspace splash/logo'sunu kapat
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

# ─── General — gaps (floating waybar ile mükemmel hizalanır) ──
# Not: col.active_border / col.inactive_border colors.conf'ta (palette'ten).
general {
    # gaps_in = 5 → görünen pencere↔pencere gap = 10 (her pencerede 5 padding, toplam 10)
    # gaps_out = 10 → pencere↔ekran kenarı = 10 (waybar margin ile de eşit)
    gaps_in     = 5
    gaps_out    = 10
    border_size = 0
    layout      = dwindle
}

# ─── Decoration (modern minimalist, köşeli) ──────────────
decoration {
    rounding = 0              # SHARP corners — yuvarlak YOK

    active_opacity     = 0.88
    inactive_opacity   = 0.80
    fullscreen_opacity = 1.00

    dim_inactive = true
    dim_strength = 0.08

    # Çok hafif blur — sadece depth hissi, bulanıklık değil.
    blur {
        enabled           = true
        size              = 4
        passes            = 2
        noise             = 0.02
        contrast          = 1.0
        brightness        = 1.0
        vibrancy          = 0.10
        vibrancy_darkness = 0.15
        special           = true
        popups            = true
        popups_ignorealpha = 0.2
    }

    shadow {
        enabled = false
    }
}

# ─── Animations (snappy, overshoot yok) ──────────────────
animations {
    enabled = true

    # snap: hızlı ease-out, sert flat geçişler için.
    bezier = snap,   0.18, 0.90, 0.25, 1.00
    # soft: HAFİF overshoot (1.03) — zen bounce, tatlı. aşırı bouncy değil.
    bezier = soft,   0.25, 1.05, 0.40, 1.00
    # slideOut: kapanan pencere için minimal inward curve
    bezier = slideOut, 0.40, 0.00, 0.60, 0.00

    animation = windowsIn,        1, 3, soft,    popin 92%
    animation = windowsOut,       1, 3, slideOut, popin 92%
    animation = windowsMove,      1, 3, soft
    animation = border,           1, 5, snap
    animation = fade,             1, 3, snap
    animation = workspaces,       1, 4, soft,    slide
    animation = specialWorkspace, 1, 5, soft,    slidevert
}

# ─── Layer blur (waybar, bildirimler, launcher popup'ları) ─
# Hyprland 0.54: layerrule virgülsüz, boşluklu format
layerrule = blur waybar
layerrule = blur notifications
layerrule = blur launcher

# ─── Window rules (Hyprland 0.54 block syntax) ──────────
# Her pencere default FLOATING. Tile istediğini Super+W ile tile'a çevir.
# Her yeni pencere: float + ekranın ~%70'i (1792×1008 @ 2560×1440) + merkez
# Not: Hyprland 0.54 `size` keyword'ünde percentage parse etmeyebiliyor,
# o yüzden absolute. Monitor değişirse güncelle (veya host-setup script'i).
windowrule {
    name        = float-all
    match:class = .*
    float       = 1
    size        = 1792 1008
    center      = 1
}

# TUI'ler daha kompakt (override et)
windowrule {
    name        = tui-launcher-rule
    match:class = ^tui-launcher$
    size        = 720 480
    center      = 1
    opacity     = 0.96
}
windowrule {
    name        = tui-clipboard-rule
    match:class = ^tui-clipboard$
    size        = 720 480
    center      = 1
    opacity     = 0.96
}
windowrule {
    name        = tui-settings-rule
    match:class = ^tui-settings$
    size        = 820 560
    center      = 1
    opacity     = 0.96
}

# ─── User overrides (TUI settings buraya yazar — EN SON source edilir) ──
source = ~/.config/hypr/overrides.conf
