# kitty main config — colors.conf generate-themes.sh tarafından palette.sh'tan üretilir.
# Source: ~/Claude/dotfiles/kitty/kitty.conf (symlink'li)

# ── Font — Cascadia Code NF (Microsoft Nerd Font, ligature + icon dahili) ──
font_family       Cascadia Code NF
bold_font         auto
italic_font       auto
bold_italic_font  auto
font_size         11.0
disable_ligatures never
modify_font       cell_height 112%
modify_font       baseline 1
text_composition_strategy legacy
text_fg_override_threshold 0
# Nerd glyph'leri Cascadia Code NF'ye gömülü — symbol_map'a gerek yok.

# ── Cursor + trail animation ────────────────────────────
cursor_shape               beam
cursor_beam_thickness      1.6
cursor_blink_interval      0.5
cursor_stop_blinking_after 15.0
cursor_trail               3
cursor_trail_start_threshold 2
cursor_trail_decay         0.10 0.40

# ── Scrollback ──────────────────────────────────────────
scrollback_lines                10000
scrollback_pager_history_size   64
wheel_scroll_multiplier         5.0
touch_scroll_multiplier         1.0

# ── Bell ────────────────────────────────────────────────
enable_audio_bell     no
visual_bell_duration  0.15
visual_bell_color     none
window_alert_on_bell  yes

# ── Pencere ─────────────────────────────────────────────
window_padding_width       12
hide_window_decorations    yes
confirm_os_window_close    0
placement_strategy         center
remember_window_size       yes
inactive_text_alpha        0.85
dim_opacity                0.55
sync_to_monitor            yes
resize_debounce_time       0.05

# ── Saydamlık (Hyprland blur ile) ───────────────────────
background_opacity          0.80
dynamic_background_opacity  yes
background_tint             0.0

# ── Tab bar ─────────────────────────────────────────────
tab_bar_edge        top
tab_bar_style       powerline
tab_powerline_style slanted
tab_bar_min_tabs    2
tab_switch_strategy previous
tab_fade            0.25 0.5 0.75 1

# ── Shell integration — prompt mark'lar görünür çıkıyor, no-prompt-mark ile gizle
shell_integration enabled no-prompt-mark no-cwd no-title no-cursor

# ── Matugen paleti ──────────────────────────────────────
include colors.conf
